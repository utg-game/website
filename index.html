<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untitled Tree Game</title>
<style>
@import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css');

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
    background-size: cover;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #fff;
    min-height: 100vh;
}

h1 {
    margin-top: 40px;
    font-size: 3em;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
}

.game-widget{
    position:absolute;
    right:20px;
    top:20px;
}

.roblox-game-card{
    width:300px;
    background:#1f2024;
    border-radius:12px;
    overflow:hidden;
    font-family:Arial;
    color:white;
}

.game-thumb{
    width:100%;
    height:170px;
    object-fit:cover;
}

.game-content{
    padding:14px;
}

.game-content h2{
    margin:0;
    font-size:18px;
}

.creator{
    color:#b8b8b8;
    font-size:14px;
    margin-top:4px;
}

.play-button{
    display:block;
    margin-top:12px;
    text-align:center;
    background:#3b5cff;
    padding:10px;
    border-radius:8px;
    color:#fff;
    text-decoration:none;
    font-weight:bold;
    text-decoration: none;
}

.play-button:link,
.play-button:visited {
    text-decoration: none;
    color: #fff;
}

.play-button:hover,
.play-button:active {
    text-decoration: none;
    color: #fff;
}

.author-line p {
    margin: 0;
    line-height: 1;
    color: #c0c0c0; /* grayish */
    font-weight: normal;
}

.author-line a.creator {
    color: #ffffff; /* full white */
    font-weight: bold;
    text-decoration: none;
}

.game-content .author-line {
    display: flex;
    align-items: center;
    gap: 4px; /* space between "By" and link */
}

.buttons {
    position: sticky;
    top: 15px; /* distance from top when sticking */
    z-index: 999; /* stays above content but below modal */
}
.buttons button {
    padding: 12px 20px;
    margin: 0 8px;
    font-size: 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background-color: rgba(0,0,0,0.6);
    color: #fff;
    transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
    display: inline-flex;
    align-items: center;
}
.buttons button i {
    margin-right: 8px;
}
.buttons button:hover {
    background-color: rgba(0,0,0,0.8);
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(0, 200, 150, 0.7);
}

.window {
    background: rgba(0, 0, 0, 0.7); /* black with transparency */
    color: #fff;
    border-radius: 12px;
    padding: 30px;
    margin-top: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    display: inline-block;
    overflow: hidden;
    width: auto;
    height: auto;
    max-width: 90%;
    transition: width 0.5s ease, height 0.5s ease;
}
.window-content a {
    color: #00695c;
    text-decoration: none;
    font-weight: bold;
}
.window-content a:hover {
    text-decoration: underline;
}
.window-content blockquote {
    margin: 10px 0;
    padding-left: 15px;
    border-left: 4px solid #00695c;
}
.window-content ul {
    margin-left: 20px;
}
.toggle-btn {
    padding: 2px 6px;
    font-size: 12px;
    margin-left: 5px;
    cursor: pointer;
    border: 1px solid #00695c;
    background-color: rgba(0,0,0,0.05);
    color: #00695c;
    border-radius: 4px;
}
.toggle-btn:hover {
    background-color: rgba(0,0,0,0.1);
}

.journal-images {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 80px;
    gap: 90px;
}
.journal-images img {
    width: 400px;
    height: auto;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: transform 0.3s;
    display: block;
    transform-origin: center;
}

.rotate-neg5 { transform: rotate(-5deg); }
.rotate-5 { transform: rotate(5deg); }

.journal-images img:hover {
    transform: rotate(0deg) scale(1.5);
}
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}
.modal-content {
    position: relative;
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    max-width: 90%;
    max-height: 90%;
    overflow: auto;
}
.modal-content img {
    max-width: 100%;
    max-height: 80vh;
    display: block;
    margin: 0 auto;
}
.close-btn {
    position: absolute;
    top: 8px;
    right: 12px;
    cursor: pointer;
    font-weight: bold;
    font-size: 20px;
    color: #333;
}
.close-btn:hover {
    color: #00695c;
}
</style>
</head>
<body>

<h1>Untitled Tree Game</h1>

<div class="buttons">
    <button onclick="showDiscordWindow()"><i class="fab fa-discord"></i>Discord</button>
    <button onclick="showWindow('game')"><i class="fas fa-gamepad"></i>Roblox</button>
    <button onclick="showWindow('rules')"><i class="fas fa-book"></i>Other</button>
</div>

<div class="window" id="contentWindow">
    <div class="window-content" id="windowContent">
        <p>Welcome.</p>
    </div>
</div>

<!-- Modal for team colors -->
<div class="modal" id="colorsModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">×</span>
        <img src="https://cdn.discordapp.com/attachments/1429133321773777022/1476630148228055090/teamcolors.png?ex=69a912bd&is=69a7c13d&hm=a5d71bdbc37894fa13db8dc71f591864d5411e93106b882916b076960b78f78d&" alt="Team Colors">
    </div>
</div>

<script>
const contentData = {
    game: `

        <div style="display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start;">

    <!-- Text Column -->
    <div style="flex: 1; min-width: 200px;">
        <blockquote>
            <p><a href="https://www.roblox.com/games/120236804424591/Untitled-Tree-Game" target="_blank">
            https://www.roblox.com/games/120236804424591/Untitled-Tree-Game</a></p>
            <p><strong>Owner:</strong> <a href="https://www.roblox.com/users/9751195245/profile" target="_blank">laszi_top</a></p>
        </blockquote>

        <h3>Gamepasses (Rejoin needed to activate)</h3>
        <ul>
            <li><a href="https://www.roblox.com/game-pass/1727800403/run" target="_blank">Run</a></li>
            <li><a href="https://www.roblox.com/game-pass/1729246350/shovel" target="_blank">Shovel</a></li>
            <li><a href="https://www.roblox.com/game-pass/1727326643/minions" target="_blank">Minions</a></li>
        </ul>
                <h3>Votekicking</h3>
        <ul>
            <li>Votekick only if someone is building NSFW content, or cursing</li>
            <li>Stealing is not a reason</li>
            <li>Start a votekick: <code>!vk player</code></li>
            <li>Vote: <code>!vkno</code> / <code>!vkyes</code></li>
            <li>Server cooldown: 5 minutes</li>
        </ul>
    </div>
    

    <!-- Roblox Card -->
    <div style="flex-shrink:0;">
        <div class="roblox-game-card">
            <img class="game-thumb" src="https://tr.rbxcdn.com/180DAY-2764c31efb257bbba8e277d0886d2536/768/432/Image/Webp/noFilter">

            <div class="game-content">
    <h2>Untitled Tree Game [Beta]</h2>
    <div class="author-line">
        <p>By</p>
        <a class="creator" href="https://www.roblox.com/users/9751195245/profile" target="_blank">@laszi_top</a>
    </div>

    <a class="play-button"
       href="https://www.roblox.com/games/120236804424591/Untitled-Tree-Game-Beta?gameSetTypeId=100000003&homePageSessionInfo=9bda920e-d238-452c-a302-4acc19941a87&isAd=false&numberOfLoadedTiles=10&page=homePage&placeId=120236804424591&playContext=homePage&position=0&positionInRow=0&rowOnPage=1&sortPos=1&universeId=9796369629#ropro-quick-play"
       target="_blank">
       ▶
    </a>
</div>
        </div>
    </div>

</div>

        <h3>Building</h3>
        <ul>
            <li>Do not build NSFW content</li>
            <li>Painting: <code>!paint</code>, select color and click blocks (2 min cooldown)</li>
            <li>Blocks might dupe into each other, just mine both blocks</li>
            <li>Building is meant to be upwards, placing on the sides can be tricky</li>
        </ul>
        <h3>Minions</h3>
        <ul>
            <li>Spawn one with <code>!summon</code></li>
            <li>You can have a max amount of 3, and cooldown for spawning once a minute.</li>
            <li><code>!defense</code> - Circle around the player</li>
            <li><code>!attack</code> - Stand infront of the player</li>
            <li><code>!stay</code> - Stay in one place</li>
            <li>Short detect range, small damage</li>
        </ul>
        <h3>Teams</h3>
        <ul>
            <li><code>!teamjoin name</code> - Join a team</li>
            <li><code>!teamleave name</code> - Leave a team</li>
            <br>
            <li>Team owner:</li>
            <li><code>!teamcreate name</code> - Create a team</li>
            <li><code>!teamdelete name</code> - Delete a team</li>
            <li><code>!teamname name</code> - Rename the team</li>
            <li><code>!teamcolor color</code> - Set team color<button class="toggle-btn" onclick="openModal()">View Colors</button></li>
        </ul>
        <h3>Rare Trees</h3>
        <ul>
            <li>Rare trees have a 1/1000 chance to spawn</li>
            <li>Rare trees give a rare block, which can be painted, rare blocks are infinite.</li>
        </ul>
        <hr>
        <div class="journal-images">
            <img src="https://tr.rbxcdn.com/180DAY-706aaab8bd15d268b10572632de1609e/768/432/Image/Webp/noFilter" alt="Journal 1" class="rotate-neg5">
            <img src="https://tr.rbxcdn.com/180DAY-2764c31efb257bbba8e277d0886d2536/768/432/Image/Webp/noFilter" alt="Journal 2" class="rotate-5">
            <img src="https://tr.rbxcdn.com/180DAY-a2e5cab63f5c306b3218d72d8f882704/768/432/Image/Webp/noFilter" alt="Journal 3" class="rotate-neg5">
            <img src="https://tr.rbxcdn.com/180DAY-5659d0030a73cbaa30cd6e1ec5ed4fbf/768/432/Image/Webp/noFilter" alt="Journal 4" class="rotate-5">
            <img src="https://tr.rbxcdn.com/180DAY-f38832ddd6377856971957ffd3933fac/768/432/Image/Webp/noFilter" alt="Journal 5" class="rotate-neg5">
        </div>
    `,
    rules: `<p>Awesome website right?</p>`
};

function showWindow(type) {
    const winDiv = document.getElementById('contentWindow');
    const winContent = document.getElementById('windowContent');

    // Discord handled separately
    if(type === 'discord') {
        showDiscordWindow();
        return;
    }

    const newContent = contentData[type] || '<p>Content not found.</p>';

    if (!winDiv.style.width) winDiv.style.width = winDiv.offsetWidth + 'px';
    if (!winDiv.style.height) winDiv.style.height = winDiv.offsetHeight + 'px';

    const clone = winDiv.cloneNode(true);
    clone.style.visibility = 'hidden';
    clone.style.position = 'absolute';
    clone.style.width = 'auto';
    clone.style.height = 'auto';
    clone.querySelector('#windowContent').innerHTML = newContent;
    document.body.appendChild(clone);

    const newWidth = clone.offsetWidth + 'px';
    const newHeight = clone.offsetHeight + 'px';
    document.body.removeChild(clone);

    setTimeout(() => {
        winDiv.style.width = newWidth;
        winDiv.style.height = newHeight;
    }, 20);

    setTimeout(() => {
        winContent.innerHTML = newContent;

        const imgs = winContent.querySelectorAll('img');
        let loadedCount = 0;
        if (imgs.length === 0) return;

        imgs.forEach(img => {
            if (img.complete) {
                loadedCount++;
                if (loadedCount === imgs.length) finalizeResize();
            } else {
                img.onload = img.onerror = () => {
                    loadedCount++;
                    if (loadedCount === imgs.length) finalizeResize();
                };
            }
        });

        function finalizeResize() {
            const clone2 = winDiv.cloneNode(true);
            clone2.style.visibility = 'hidden';
            clone2.style.position = 'absolute';
            clone2.style.width = 'auto';
            clone2.style.height = 'auto';
            document.body.appendChild(clone2);

            const finalWidth = clone2.offsetWidth + 'px';
            const finalHeight = clone2.offsetHeight + 'px';
            document.body.removeChild(clone2);

            winDiv.style.width = finalWidth;
            winDiv.style.height = finalHeight;
        }
    }, 50);
}

function openModal() {
    document.getElementById('colorsModal').style.display = 'flex';
}
function closeModal() {
    document.getElementById('colorsModal').style.display = 'none';
}

function showDiscordWindow() {
    const winDiv = document.getElementById('contentWindow');
    const winContent = document.getElementById('windowContent');

    const newContent = `
        <div style="display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start;">
            <!-- Text Column -->
            <div style="flex: 1; min-width: 200px;">
                <blockquote>
                    <p><a href="https://discord.com/invite/Fq7cKHscHA" target="_blank">https://discord.com/invite/Fq7cKHscHA</a></p>
                    <p><strong>Owner:</strong> laszi_ (vegh#1821)</p>
                </blockquote>
                <h3>Rules</h3>
                <ul>
                    <li>No NSFW</li>
                    <li>Don't curse too much</li>
                </ul>
            </div>

            <!-- Discord Widget -->
            <div style="flex-shrink: 0;">
                <iframe src="https://discord.com/widget?id=1476291858140233738&theme=dark"
                        width="250" height="300"
                        allowtransparency="true"
                        frameborder="0"
                        sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
                </iframe>
            </div>
        </div>
    `;

    if (!winDiv.style.width) winDiv.style.width = winDiv.offsetWidth + 'px';
    if (!winDiv.style.height) winDiv.style.height = winDiv.offsetHeight + 'px';

    const clone = winDiv.cloneNode(true);
    clone.style.visibility = 'hidden';
    clone.style.position = 'absolute';
    clone.style.width = 'auto';
    clone.style.height = 'auto';
    clone.querySelector('#windowContent').innerHTML = newContent;
    document.body.appendChild(clone);

    const newWidth = clone.offsetWidth + 'px';
    const newHeight = clone.offsetHeight + 'px';
    document.body.removeChild(clone);

    setTimeout(() => {
        winDiv.style.width = newWidth;
        winDiv.style.height = newHeight;
    }, 20);

    setTimeout(() => {
        winContent.innerHTML = newContent;
    }, 50);
}
</script>

</body>
</html>
