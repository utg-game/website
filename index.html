<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untitled Tree Game</title>
<style>
@import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css');

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
    background-size: cover;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #fff;
    min-height: 100vh;
}

h1 {
    margin-top: 40px;
    font-size: 3em;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
}

.buttons {
    margin: 20px;
}
.buttons button {
    padding: 12px 20px;
    margin: 0 8px;
    font-size: 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background-color: rgba(0,0,0,0.6);
    color: #fff;
    transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
    display: inline-flex;
    align-items: center;
}
.buttons button i {
    margin-right: 8px;
}
.buttons button:hover {
    background-color: rgba(0,0,0,0.8);
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(0, 200, 150, 0.7);
}

.window {
    background: rgba(255, 255, 255, 0.95);
    color: #333;
    border-radius: 12px;
    padding: 30px;
    margin-top: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    display: inline-block;
    overflow: hidden;
    width: auto;
    height: auto;
    max-width: 90%;
    transition: width 0.5s ease, height 0.5s ease;
}
.window-content a {
    color: #00695c;
    text-decoration: none;
    font-weight: bold;
}
.window-content a:hover {
    text-decoration: underline;
}
.window-content blockquote {
    margin: 10px 0;
    padding-left: 15px;
    border-left: 4px solid #00695c;
}
.window-content ul {
    margin-left: 20px;
}
.toggle-btn {
    padding: 2px 6px;
    font-size: 12px;
    margin-left: 5px;
    cursor: pointer;
    border: 1px solid #00695c;
    background-color: rgba(0,0,0,0.05);
    color: #00695c;
    border-radius: 4px;
}
.toggle-btn:hover {
    background-color: rgba(0,0,0,0.1);
}

/* Journal images stacked vertically */
.journal-images {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 20px;
    gap: 20px;
}
.journal-images img {
    width: 200px;
    height: auto;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: transform 0.3s;
    display: block;
}
.journal-images img:hover {
    transform: rotate(0deg) scale(1.05);
}
</style>
</head>
<body>

<h1>Untitled Tree Game</h1>

<div class="buttons">
    <button onclick="showWindow('discord')"><i class="fab fa-discord"></i>Discord</button>
    <button onclick="showWindow('game')"><i class="fas fa-gamepad"></i>Roblox</button>
    <button onclick="showWindow('rules')"><i class="fas fa-book"></i>Other</button>
</div>

<div class="window" id="contentWindow">
    <div class="window-content" id="windowContent">
        <p>Welcome.</p>
    </div>
</div>

<script>
const contentData = {
    discord: `
        <blockquote>
            <p><a href="https://discord.com/invite/Fq7cKHscHA" target="_blank">https://discord.com/invite/Fq7cKHscHA</a></p>
            <p><strong>Owner:</strong> @laszi_</p>
        </blockquote>
        <h3>Rules</h3>
        <ul>
            <li>No NSFW</li>
            <li>Don't curse too much</li>
        </ul>
    `,
    game: `
        <blockquote>
            <p><a href="https://www.roblox.com/games/120236804424591/Untitled-Tree-Game" target="_blank">https://www.roblox.com/games/120236804424591/Untitled-Tree-Game</a></p>
            <p><strong>Owner:</strong> <a href="https://www.roblox.com/users/9751195245/profile" target="_blank">laszi_top</a></p>
        </blockquote>
        <h3>Gamepasses (Rejoin needed to activate)</h3>
        <ul>
            <li><a href="https://www.roblox.com/game-pass/1727800403/run" target="_blank">Run</a> - Grants permission to run, hold <strong>CTRL</strong> to run</li>
            <li><a href="https://www.roblox.com/game-pass/1729246350/shovel" target="_blank">Shovel</a> - Grants votekick & team commands permissions, also a weapon: <code>!shovel</code> (2 min cooldown)</li>
        </ul>
        <h3>Votekicking</h3>
        <ul>
            <li>Votekick only if someone is building NSFW content, or cursing</li>
            <li>Stealing is not a reason</li>
            <li>Start a votekick: <code>!vk player</code></li>
            <li>Vote: <code>!vkno</code> / <code>!vkyes</code></li>
            <li>Server cooldown: 5 minutes</li>
        </ul>
        <h3>Building</h3>
        <ul>
            <li>Do not build NSFW content</li>
            <li>Painting: <code>!paint</code>, select color and click blocks (2 min cooldown)</li>
            <li>Blocks might dupe into each other, just mine both blocks</li>
            <li>Building is meant to be upwards, placing on the sides can be tricky</li>
        </ul>
        <h3>Teams</h3>
        <ul>
            <li><code>!teamjoin name</code> - Join a team</li>
            <li><code>!teamleave name</code> - Leave a team</li>
            <li>Gamepass commands:</li>
            <ul>
                <li><code>!teamcreate name</code> - Create a team (Only team owner)</li>
                <li><code>!teamdelete name</code> - Delete a team (Only team owner)</li>
                <li><code>!teamname name</code> - Rename the team (Only team owner)</li>
                <li><code>!teamcolor color</code> - Set team color (Only team owner) <button class="toggle-btn" onclick="toggleColors()">Show/Hide Colors</button></li>
            </ul>
        </ul>
        <img id="teamColors" src="https://cdn.discordapp.com/attachments/1429133321773777022/1476630148228055090/teamcolors.png?ex=69a912bd&is=69a7c13d&hm=a5d71bdbc37894fa13db8dc71f591864d5411e93106b882916b076960b78f78d&" alt="Team Colors" style="display:none;">
        <h3>Rare Trees</h3>
        <ul>
            <li>Rare trees have a 1/1000 chance to spawn</li>
            <li>Rare trees give rare block, which can be painted; rare blocks are infinite (No block given when mined)</li>
        </ul>
        <div class="journal-images">
            <img src="https://tr.rbxcdn.com/180DAY-706aaab8bd15d268b10572632de1609e/768/432/Image/Webp/noFilter" alt="Journal 1" style="transform: rotate(-5deg);">
            <img src="https://tr.rbxcdn.com/180DAY-2764c31efb257bbba8e277d0886d2536/768/432/Image/Webp/noFilter" alt="Journal 2" style="transform: rotate(3deg);">
            <img src="https://tr.rbxcdn.com/180DAY-a2e5cab63f5c306b3218d72d8f882704/768/432/Image/Webp/noFilter" alt="Journal 3" style="transform: rotate(-2deg);">
        </div>
    `,
    rules: `<p>Awesome website right?</p>`
};

function showWindow(type) {
    const winDiv = document.getElementById('contentWindow');
    const winContent = document.getElementById('windowContent');
    const newContent = contentData[type] || '<p>Content not found.</p>';

    winContent.innerHTML = newContent;

    const imgs = winContent.querySelectorAll('img');
    let loadedCount = 0;
    if (imgs.length === 0) {
        resizeWindow();
    } else {
        imgs.forEach(img => {
            if (img.complete) {
                loadedCount++;
                if (loadedCount === imgs.length) resizeWindow();
            } else {
                img.onload = img.onerror = () => {
                    loadedCount++;
                    if (loadedCount === imgs.length) resizeWindow();
                };
            }
        });
    }

    function resizeWindow() {
        const clone = winDiv.cloneNode(true);
        clone.style.visibility = 'hidden';
        clone.style.position = 'absolute';
        clone.style.width = 'auto';
        clone.style.height = 'auto';
        document.body.appendChild(clone);
        const newWidth = clone.offsetWidth + 'px';
        const newHeight = clone.offsetHeight + 'px';
        document.body.removeChild(clone);

        winDiv.style.width = newWidth;
        winDiv.style.height = newHeight;
    }
}

function toggleColors() {
    const img = document.getElementById('teamColors');
    img.style.display = (img.style.display === 'none' || img.style.display === '') ? 'block' : 'none';
    showWindow('game'); // Recalculate size
}
</script>

</body>
</html>
